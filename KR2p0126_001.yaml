body:
  text: 散見簡牘合輯湖北江陵鳳凰山一六八號漢墓竹牘衡杆文字十三年五月庚辰江陵丞敢告地下丞市陽五大夫𤎩自言與大奴良等廿八人大婢益等十八人軺車二乘牛車一兩駟馬四匹駠馬二匹騎馬四匹可令吏以從事敢告主正為市陽戶人嬰家稱錢衡以錢為纍劾曰四朱兩端十敢擇輕重衡及弗用劾論罰繇里家十日黃律
